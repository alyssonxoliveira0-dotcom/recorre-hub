[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/asaas/*"
  to = "/.netlify/functions/asaas/:splat"
  status = 200

[[redirects]]
  from = "/api/storage"
  to = "/.netlify/functions/storage"
  status = 200

[[redirects]]
  from = "/api/auth"
  to = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/api/conselheiro"
  to = "/.netlify/functions/conselheiro"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"